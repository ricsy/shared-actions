# =============================================================================
# PyPI 构建 Action
#
# 功能：构建 Python 包
#
# 输入：
#   python-version: Python 版本（默认 3.x）
#   package-dir: 包目录路径（默认 .）
#
# 使用方式：
#   steps:
#     - uses: ricsy/shared-actions/.github/actions/pypi@master
#       with:
#         python-version: "3.x"
# =============================================================================

name: Build Python Package
description: 构建 Python 包

inputs:
  python-version:
    required: false
    type: string
    default: "3.x"
  package-dir:
    required: false
    type: string
    default: "."

runs:
  using: composite
  steps:
    # 1. 检出代码
    - uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    # 3. 构建源码包和 wheel 包
    - name: 构建发布包
      shell: bash
      run: |
        python -m pip install build
        python -m build

    # 4. 上传构建产物
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: release-dists
        path: ${{ inputs.package-dir }}/dist/
