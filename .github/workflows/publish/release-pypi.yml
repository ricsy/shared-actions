# =============================================================================
# PyPI Release 发布工作流
#
# 功能：在 GitHub Release 发布时自动构建并发布 Python 包到 PyPI
# 触发：release（GitHub Release published 时触发）
#
# 前置要求：
#   1. 仓库设置 environment
#   2. 配置 Trusted Publishing (OIDC)
#
# 使用方式：
#   在项目 .github/workflows/release.yml 中使用此工作流
# =============================================================================

name: Publish to PyPI on Release

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      # 1. 使用 build action 构建
      - uses: ricsy/shared-actions/.github/actions/pypi/build@master

      # 2. 下载构建产物
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      # 3. 使用 Trusted Publishing 上传至 PyPI
      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
