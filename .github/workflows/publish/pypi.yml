# =============================================================================
# PyPI 发布工作流
#
# 功能：构建并发布 Python 包到 PyPI
# 触发：workflow_call（其他工作流调用）
#
# 输入：
#   python-version: Python 版本（默认 3.x）
#   package-dir: 包目录路径（默认 .）
#
# 前置要求：
#   1. 仓库设置 environment
#   2. 配置 Trusted Publishing (OIDC)
#
# 使用示例：
#   jobs:
#     publish:
#       uses: ricsy/shared-actions/.github/workflows/publish/pypi.yml@master
# =============================================================================

name: Publish to PyPI

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.x"
      package-dir:
        required: false
        type: string
        default: "."

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      # 1. 使用 build action 构建
      - uses: ricsy/shared-actions/.github/actions/pypi@master
        with:
          python-version: ${{ inputs.python-version }}
          package-dir: ${{ inputs.package-dir }}

      # 2. 下载构建产物
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      # 3. 使用 Trusted Publishing 上传至 PyPI
      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
